# Pipeline configuration — models, training, retrieval, generation.

models:
  encoder: "sentence-transformers/all-MiniLM-L6-v2"
  encoder_embedding_dim: 384
  generator: "google/flan-t5-base"

paths:
  models_dir: "../models"
  output_dir: "./rag_output"
  data_dir: "./data"
  train_data: "data/hotpot_qa/train.csv"
  valid_data: "data/hotpot_qa/valid.csv"

retriever_training:
  epochs: 5
  batch_size: 16
  lr: 2.0e-5
  patience: 3
  temperature: 20.0
  accumulation_steps: 2
  use_fp16: true
  max_seq_length: 128
  checkpoint_steps: 100

generator_training:
  epochs: 3
  batch_size: 4
  lr: 5.0e-5
  warmup_ratio: 0.1
  gradient_accumulation: 1
  max_input_tokens: 512
  max_target_tokens: 128
  checkpoint_steps: 200

retrieval:
  top_k: 5
  index_batch_size: 64
  normalize_embeddings: true

generation:
  max_new_tokens: 64
  temperature: null
  do_sample: false

evaluation:
  top_k_values: [1, 3, 5]
  batch_size: 64
  cache_name: "corpus_embeds"
  rebuild_cache: false

logging:
  level: "INFO"
  log_interval: 10

reproducibility:
  seed: 42

qa_prompt_template: |
  Use the context to answer.
  Context:
  {context}
  Question: {question}
  Answer:
