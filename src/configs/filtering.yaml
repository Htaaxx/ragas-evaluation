# Filtering configuration — answer-correctness scoring only.
# No context filtering. All tunable parameters live here.

answer_filter:
  model_name: "gemini-2.5-flash"
  threshold: 6.0
  max_concurrent: 10
  max_answer_chars: 1000
  max_ground_truth_chars: 1000

reward_filter:
  correctness_threshold: 0.50
  max_retries: 3
  dataset_type: "universal"
