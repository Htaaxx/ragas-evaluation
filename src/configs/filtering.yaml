# Filtering configuration — answer-correctness scoring only.
# No context filtering. All tunable parameters live here.

answer_filter:
  model_name: "gemini-2.5-flash"
  threshold: 6.0
  max_concurrent: 10
  max_answer_chars: 1000
  max_ground_truth_chars: 1000

reward_filter:
  correctness_threshold: 0.50
  max_retries: 3
  dataset_type: "universal"

learned_filter:
  model_name: "MoritzLaurer/DeBERTa-v3-base-mnli-fever-anli"
  model_path: "models/answer_filter"
  threshold: 0.5
  max_length: 384
  batch_size: 16
  num_epochs: 10
  learning_rate: 5.0e-6
  warmup_ratio: 0.2
  weight_decay: 0.01
  max_grad_norm: 1.0
  label_smoothing: 0.0
  early_stopping_patience: 3
  fp16: false
  save_total_limit: 3
  seed: 42
  use_context: true
  context_dropout: 0.15

nli_filter:
  model_name: "microsoft/deberta-v3-base-mnli-fever-anli"
  threshold: 0.5
  max_length: 512

ensemble_filter:
  threshold: 0.5
  regularization_C: 1.0
  max_iter: 1000
  seed: 42
