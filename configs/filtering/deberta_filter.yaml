# Filtering configuration — faithfulness verification.
# Retrieval is assumed correct. Filters check if the generated
# answer is faithful to the retrieved context (NLI framing).

answer_filter:
  model_name: "gemini-2.5-flash"
  threshold: 6.0
  max_concurrent: 10
  max_answer_chars: 1000
  max_ground_truth_chars: 1000

reward_filter:
  correctness_threshold: 0.50
  max_retries: 3
  dataset_type: "universal"

learned_filter:
  model_name: "MoritzLaurer/DeBERTa-v3-base-mnli-fever-anli"
  model_path: "models/answer_filter"
  threshold: 0.5
  # max_length 512 needed: at 384 the truncation collision rate was 47.5%,
  # i.e. half the (correct, hallucinated) pairs became identical post-tokenization.
  # Combined with truncation="only_first" (always truncate context, NEVER answer),
  # this preserves the discriminative trailing entity in every sample.
  max_length: 512
  # batch_size 4 needed for fp32 + max_length=512 on 16 GB GPUs (T4/P100).
  # Effective batch size stays at 16 via gradient_accumulation_steps=4 (auto).
  batch_size: 4
  num_epochs: 10
  # learning_rate lowered 2e-5 -> 1e-5: DeBERTa-v3 is numerically delicate;
  # the previous run went NaN at epoch 3 with 2e-5.
  learning_rate: 1.0e-5      # backbone LR (pretrained DeBERTa-v3, kept small)
  # classifier_lr: differential LR for the randomly-initialized 2-class head.
  # A single shared 1e-5 left this fresh head undertrained -> loss stuck at
  # ln 2 (~0.693) and all-reject collapse. Capped at 5e-5 per the diagnostic
  # discipline rule; wired in train_classifier via _build_differential_optimizer.
  classifier_lr: 5.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  max_grad_norm: 1.0
  # Per-group AdamW epsilon: ROOT-CAUSE FIX for the NaN explosion on PyTorch
  # 2.9+/Transformers 5.0, where eps=1e-8 is pathological (a single AdamW step
  # turns a finite gradient into a NaN weight). A LARGE eps stabilizes but
  # freezes learning (loss stuck at ln 2, F1 random). So we use a per-group
  # middle ground (and the non-fused AdamW path, see _build_differential_optimizer):
  #   - backbone: large eps -> SGD-like, stable (pretrained, barely needs to move)
  #   - head: moderate eps (~1e-3) -> small vs the head's gradient RMS (~1e-2)
  #     so it still learns at near-Adam speed, but large enough to dodge the bug.
  backbone_adam_epsilon: 1.0
  head_adam_epsilon: 1.0e-3
  # overfit_learning_rate: head LR for the sanity gate (backbone uses
  # learning_rate above). The gate fits 32 samples in 50 epochs. At 2e-4 the
  # gate reached F1=0.857 (stable, P=1.0, only 4 positives under-fit); 5e-4
  # gives the head enough push to clear the last few. This is the GATE LR only
  # (gate-isolated) — full-training head LR stays at classifier_lr=5e-5. The
  # old "5e-4 forbidden" note applied under the eps=1e-8 NaN regime, which the
  # per-group eps + non-fused AdamW fix has eliminated.
  overfit_learning_rate: 5.0e-4
  label_smoothing: 0.0
  early_stopping_patience: 3
  fp16: false                # NEVER set to true (DeBERTa-v3 instability)
  save_total_limit: 3
  seed: 42
  # FP-minimization threshold sweep (Step 10)
  min_recall_for_threshold: 0.70
  # Weighted-loss tilt (Step 11) — only enable if Step 10 still has high FPR
  use_weighted_loss: false
  loss_weight_neg: 2.0
  loss_weight_pos: 1.0

nli_filter:
  model_name: "MoritzLaurer/DeBERTa-v3-base-mnli-fever-anli"
  threshold: 0.5
  max_length: 512

ensemble_filter:
  threshold: 0.5
  regularization_C: 1.0
  max_iter: 1000
  seed: 42
