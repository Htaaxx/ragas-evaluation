# Secondary normal RAG benchmark over MS MARCO.

seed: 42

model:
  name: "Qwen/Qwen2.5-7B-Instruct"
  backend: "causal_instruct"
  dtype: "half"
  max_new_tokens: 160
  max_input_tokens: 2048
  temperature: 0.0
  top_p: 0.9
  repetition_penalty: 1.05
  load_in_4bit: true
  device_map: "auto"
  system_prompt: "You are a RAG question-answering assistant. Use the retrieved context to answer every question with a short, factual answer."

retriever:
  encoder_model: "sentence-transformers/all-MiniLM-L6-v2"
  top_k: 3
  normalize_embeddings: true
  index_batch_size: 64
  index_dir: "results/normal_rag/msmarco_faiss_index"

data:
  dataset_type: "msmarco"
  csv: "data/ms-macro/msmarcro_500.csv"
  id_column: "id"
  question_column: "question"
  context_column: "context"
  answer_column: "gold_answer"
  metadata_columns: []
  max_passage_chars: 1200
  max_samples:
  filters: {}

generation:
  prompt_template: |
    Answer the question using the retrieved context below. Give a short, direct answer.

    Question: {question}

    Context:
    {context}

    Answer:

evaluation:
  results_dir: "results/normal_rag/msmarco"
  predictions_csv: "predictions.csv"
  metrics_json: "metrics.json"
  group_fields: []
